{% extends "base.html" %}

{% block content %}
  <h1>Teams List</h1>
  {% if team_list %}
    <ul>
      {% for team in team_list %}
        <li>
          <a href="#"></a>
          {{ team.name }}
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>There are no teams</p>
  {% endif %}
{% endblock %}
