{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
  <h1>
    Projects List
    <a style="float: right;" class="btn btn-primary" href="{% url 'tasks:project-create' %}"><b>+</b></a>
  </h1>

  {% if project_list %}
    <ul>
      {% for project in project_list %}
        <li>
          <a href="{{ project.get_absolute_url }}">
            {{ project.name }}
          </a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>There are no projects</p>
  {% endif %}
{% endblock %}
