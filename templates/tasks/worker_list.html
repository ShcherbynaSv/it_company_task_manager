{% extends "base.html" %}

{% block content %}
  <h1>Workers List</h1>
  {% if worker_list %}
    <ul>
      {% for worker in worker_list %}
        <li>
          <a href="#"></a>
          {{ worker.first_name }} {{ worker.last_name }}
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>There are no workers</p>
  {% endif %}
{% endblock %}
