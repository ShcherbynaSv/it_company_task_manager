{% extends "base.html" %}

{% block content %}
  <h1>Tasks List</h1>
  {% if task_list %}
    <ul>
      {% for task in task_list %}
        <li>
          <a href="#"></a>
          {{ task.name }}
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>There are no tasks</p>
  {% endif %}
{% endblock %}
