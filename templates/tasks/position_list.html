{% extends "base.html" %}

{% block content %}
  <h1>Positions List</h1>
  {% if position_list %}
    <ul>
      {% for position in position_list %}
        <li>
          <a href="{% url 'tasks:worker-list' %}?position={{ position.id }}">
          {{ position.name }}
        </a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>There are no positions</p>
  {% endif %}
{% endblock %}
