{% extends "base.html" %}

{% block content %}
  <h1>{{ object.name }}</h1>
  <hr>
  <p><strong>Creation date: </strong> {{ object.created_at }}</p>
  <p><strong>Team: </strong><a href="{% url 'tasks:worker-list' %}?team={{ object.team.id }}">{{ object.team }}</a></p>
  <p><strong>Description:</strong></p>
  <p>{{ object.description }}</p>
{% endblock %}
